<svg width="1100" height="360" viewBox="0 0 1100 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Silindokuhle Mapiyeye skill showcase</title>
  <desc id="desc">Animated skill wall showing Laravel, PHP, Next.js, React, TypeScript, Tailwind, MySQL, Redis, Docker, AWS, Vercel, GitHub, Linux, APIs, RBAC, payments, and AI workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07130E"/>
      <stop offset="0.48" stop-color="#0B1F16"/>
      <stop offset="1" stop-color="#F7FFF9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3EE27F" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#B7FFD3" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.88 0 0 0 0 0.42 0 0 0 0.65 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .panel { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.18); }
      .tile { fill: rgba(255,255,255,0.1); stroke: rgba(255,255,255,0.22); }
      .tileDark { fill: rgba(7,19,14,0.82); stroke: rgba(62,226,127,0.35); }
      .label { fill: #F7FFF9; font: 700 18px Inter, Arial, sans-serif; letter-spacing: 0; }
      .small { fill: #C9F7D8; font: 600 12px Inter, Arial, sans-serif; letter-spacing: 0.04em; }
      .muted { fill: #DDFBE7; font: 500 14px Inter, Arial, sans-serif; }
      .title { fill: #FFFFFF; font: 800 34px Inter, Arial, sans-serif; letter-spacing: 0; }
      .chipText { fill: #F7FFF9; font: 800 15px Inter, Arial, sans-serif; letter-spacing: 0; }
      .iconText { fill: #07130E; font: 900 15px Inter, Arial, sans-serif; }
      @media (prefers-reduced-motion: reduce) {
        animateTransform, animate { display: none; }
      }
    </style>
  </defs>

  <rect width="1100" height="360" rx="26" fill="url(#bg)"/>
  <circle cx="1010" cy="74" r="180" fill="#42E883" opacity="0.14" filter="url(#softGlow)"/>
  <circle cx="116" cy="296" r="160" fill="#18A957" opacity="0.22" filter="url(#softGlow)"/>
  <path d="M38 294C188 220 346 335 501 254C655 174 813 211 1062 111" stroke="url(#glow)" stroke-width="2" opacity="0.55"/>

  <g transform="translate(48 44)">
    <rect class="panel" x="0" y="0" width="384" height="272" rx="22"/>
    <text class="small" x="30" y="44">PUBLIC ENGINEERING PROFILE</text>
    <text class="title" x="30" y="88">Skill Stack</text>
    <text class="muted" x="30" y="124">Laravel backends, Next.js interfaces,</text>
    <text class="muted" x="30" y="148">RBAC workflows, payments, cloud, and AI tools.</text>

    <g transform="translate(30 184)">
      <rect x="0" y="0" width="92" height="42" rx="13" fill="#3EE27F"/>
      <text class="iconText" x="21" y="27">API</text>
      <rect x="106" y="0" width="92" height="42" rx="13" fill="#F7FFF9"/>
